name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel (${{ matrix.os }}, ${{ matrix.target }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64,  python-version: "3.12" }
          - { os: ubuntu-latest,  target: x86_64,  python-version: "3.13" }
          - { os: ubuntu-latest,  target: aarch64, python-version: "3.12" }
          - { os: ubuntu-latest,  target: aarch64, python-version: "3.13" }
          - { os: macos-13,       target: x86_64,  python-version: "3.12" }
          - { os: macos-13,       target: x86_64,  python-version: "3.13" }
          - { os: macos-latest,   target: aarch64, python-version: "3.12" }
          - { os: macos-latest,   target: aarch64, python-version: "3.13" }
          - { os: windows-latest, target: x64,     python-version: "3.12" }
          - { os: windows-latest, target: x64,     python-version: "3.13" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python${{ matrix.python-version }}
          manylinux: auto
          sccache: true

      - name: Test wheel (unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64'
        run: |
          pip install dist/*.whl
          python -c "from confetti._rust_core import rust_available; assert rust_available()"

      - name: Test wheel (windows)
        if: runner.os == 'Windows'
        run: |
          pip install (Get-ChildItem dist/*.whl)
          python -c "from confetti._rust_core import rust_available; assert rust_available()"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
