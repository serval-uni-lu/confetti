name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            arch: x86_64
          - os: ubuntu-latest
            target: aarch64
            arch: aarch64
          - os: macos-13
            target: x86_64
            arch: x86_64
          - os: macos-latest
            target: aarch64
            arch: arm64
          - os: windows-latest
            target: x64
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Test wheel (unix)
        if: runner.os != 'Windows' && matrix.arch != 'aarch64'
        run: |
          pip install dist/*.whl
          python -c "from confetti._rust_core import rust_available; assert rust_available()"

      - name: Test wheel (windows)
        if: runner.os == 'Windows'
        run: |
          pip install (Get-ChildItem dist/*.whl)
          python -c "from confetti._rust_core import rust_available; assert rust_available()"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
