name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build Rust extension
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release
          sccache: true

      - name: Run tests
        run: uv run pytest tests/genetic_algorithm/ tests/distances/ -v --maxfail=3

  build:
    name: Build wheel (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.12
          manylinux: auto
          sccache: true

      - name: Verify wheel (unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64'
        run: |
          pip install dist/*.whl
          python -c "from confetti._rust_core import rust_available; assert rust_available()"

      - name: Verify wheel (windows)
        if: runner.os == 'Windows'
        run: |
          pip install (Get-ChildItem dist/*.whl)
          python -c "from confetti._rust_core import rust_available; assert rust_available()"
